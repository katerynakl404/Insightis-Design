<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Stats strip — Patterns</title>
<link rel="stylesheet" href="../assets/tokens.css"><link rel="stylesheet" href="../assets/base.css"><link rel="stylesheet" href="../assets/components.css"><link rel="stylesheet" href="../assets/storybook.css"></head>
<body><a class="ins-u-skip-link" href="#main">Skip to content</a>
<div class="sb-app"><aside class="sb-sidebar" data-sb-render-sidebar="../"></aside><main class="sb-main" id="main">

<header class="sb-header"><div class="sb-header__kicker">Pattern</div><h1 class="sb-header__title">Stats strip</h1><p class="sb-header__description">Horizontal row of 3–5 stat-KPI blocks with vertical dividers between columns on desktop.</p></header>

<section class="sb-section"><h2 class="sb-section__title">Stats row</h2>
<div class="sb-preview sb-preview--fullbleed" data-sb-viewport-preview>
  <div class="ins-container">
    <div class="ins-stat-strip">
      <div class="ins-stat-kpi"><span class="ins-stat-kpi__label">Customers</span><div class="ins-stat-kpi__value">2,400+</div></div>
      <div class="ins-stat-kpi"><span class="ins-stat-kpi__label">Queries / day</span><div class="ins-stat-kpi__value">1.2M</div></div>
      <div class="ins-stat-kpi"><span class="ins-stat-kpi__label">Accuracy</span><div class="ins-stat-kpi__value">98.4%</div></div>
      <div class="ins-stat-kpi"><span class="ins-stat-kpi__label">Avg. latency</span><div class="ins-stat-kpi__value">1.8s</div></div>
    </div>
  </div>
</div></section>

</main></div>
<button class="sb-mobile-toggle" data-sb-toggle=".sb-sidebar" aria-label="Toggle navigation"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
