<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CTA block — Patterns</title>

<body><a class="ins-u-skip-link" href="#main">Skip to content</a>
<div class="sb-app"><aside class="sb-sidebar" data-sb-render-sidebar="../"></aside><main class="sb-main" id="main">

<header class="sb-header"><div class="sb-header__kicker">Pattern</div><h1 class="sb-header__title">CTA block</h1><p class="sb-header__description">End-of-section call-to-action — smaller than promo banner, centered type + button pair.</p></header>

<section class="sb-section"><h2 class="sb-section__title">Centered CTA</h2>
<div class="sb-preview" data-sb-viewport-preview>
  <div style="text-align:center; padding-block:var(--ins-space-3xl);">
    <span class="ins-text-overline">Get started</span>
    <h2 class="ins-text-display" style="margin:var(--ins-space-sm) 0 var(--ins-space-md);">See Insightis in action</h2>
    <p class="ins-text-body-lg" style="max-width:54ch; margin:0 auto var(--ins-space-xl);">Book a 15-minute demo or start a free trial. No credit card required.</p>
    <div style="display:flex; gap:var(--ins-space-md); justify-content:center; flex-wrap:wrap;">
      <button class="ins-btn ins-btn--primary ins-btn--lg">Start for Free</button>
      <button class="ins-btn ins-btn--ghost ins-btn--lg">Book a demo</button>
    </div>
  </div>
</div></section>

</main></div>
