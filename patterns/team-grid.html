<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Team grid — Patterns</title>

<body><a class="ins-u-skip-link" href="#main">Skip to content</a>
<div class="sb-app"><aside class="sb-sidebar" data-sb-render-sidebar="../"></aside><main class="sb-main" id="main">

<header class="sb-header"><div class="sb-header__kicker">Pattern</div><h1 class="sb-header__title">Team grid</h1><p class="sb-header__description">Avatar + title + role composition. Built from <code>.ins-avatar--xl</code> + <code>.ins-card</code> atoms — no <code>--team-member</code> card variant needed.</p></header>

<section class="sb-section"><h2 class="sb-section__title">4-up team grid</h2>
<div class="sb-preview">
  <div class="ins-grid">
    <div class="ins-card ins-col-quarter" style="text-align:center;">
      <div class="ins-avatar ins-avatar--xl" style="margin:0 auto var(--ins-space-md);">MS</div>
      <div class="ins-card__title">Maria Sanchez</div>
      <p class="ins-card__body">Head of Product</p>
    </div>
    <div class="ins-card ins-col-quarter" style="text-align:center;">
      <div class="ins-avatar ins-avatar--xl" style="margin:0 auto var(--ins-space-md);">AK</div>
      <div class="ins-card__title">Alex Kim</div>
      <p class="ins-card__body">CTO</p>
    </div>
    <div class="ins-card ins-col-quarter" style="text-align:center;">
      <div class="ins-avatar ins-avatar--xl" style="margin:0 auto var(--ins-space-md);">JT</div>
      <div class="ins-card__title">Jordan Taylor</div>
      <p class="ins-card__body">Head of Design</p>
    </div>
    <div class="ins-card ins-col-quarter" style="text-align:center;">
      <div class="ins-avatar ins-avatar--xl" style="margin:0 auto var(--ins-space-md);">RN</div>
      <div class="ins-card__title">Riya Nair</div>
      <p class="ins-card__body">Head of Data</p>
    </div>
  </div>
</div></section>

</main></div>
