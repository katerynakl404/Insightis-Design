<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Newsletter block — Patterns</title>
<link rel="stylesheet" href="../assets/tokens.css"><link rel="stylesheet" href="../assets/base.css"><link rel="stylesheet" href="../assets/components.css"><link rel="stylesheet" href="../assets/storybook.css"></head>
<body><a class="ins-u-skip-link" href="#main">Skip to content</a>
<div class="sb-app"><aside class="sb-sidebar" data-sb-render-sidebar="../"></aside><main class="sb-main" id="main">

<header class="sb-header"><div class="sb-header__kicker">Pattern</div><h1 class="sb-header__title">Newsletter block</h1><p class="sb-header__description">"Still waiting on insights?" composer — heading + inline input-with-button rail. Submit active by default. Optional <code>data-sb-validate-email</code> to gate until valid.</p></header>

<section class="sb-section"><h2 class="sb-section__title">Default (submit always active)</h2>
<div class="sb-preview sb-preview--fullbleed" data-sb-viewport-preview>
  <div class="ins-banner-newsletter">
    <h3 class="ins-banner-newsletter__title">Still waiting on <em>insights</em> that take <em>days</em>?</h3>
    <form class="ins-banner-newsletter__composer" onsubmit="event.preventDefault()">
      <input type="email" placeholder="What info are you looking for?">
      <button type="submit">
        Get Insight
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </button>
    </form>
  </div>
</div></section>

</main></div>
<button class="sb-mobile-toggle" data-sb-toggle=".sb-sidebar" aria-label="Toggle navigation"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
<script src="../assets/storybook.js"></script></body></html>
